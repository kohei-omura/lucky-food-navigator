<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ Lucky Food Navigator</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B6B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Lucky Food">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #FFD93D;
            --accent: #6BCF7F;
            --deep: #2C3E50;
            --text: #2C3E50;
            --bg: #FFF8E7;
            --card: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE5B4 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 背景装飾 */
        .bg-deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }
        .star { 
            position: absolute;
            animation: twinkle 3s infinite;
            font-size: 1.5rem;
            opacity: 0.3;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        .food-float {
            position: absolute;
            font-size: 2rem;
            animation: float 15s infinite linear;
            opacity: 0.15;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            font-size: 0.9rem;
            color: #666;
            font-weight: 700;
        }
        
        .time-display {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .time-label {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 5px;
            letter-spacing: 0.1em;
        }
        
        .time-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            font-family: 'Zen Maru Gothic', sans-serif;
        }
        
        .fortune-btn {
            width: 100%;
            padding: 25px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            font-family: 'Zen Maru Gothic', sans-serif;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .fortune-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .fortune-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .fortune-btn:active {
            transform: scale(0.98);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.show { display: block; }
        
        .loading-icon {
            font-size: 4rem;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 15px;
            font-size: 1rem;
            color: #666;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .result {
            display: none;
        }
        .result.show {
            display: block;
            animation: resultAppear 0.8s ease-out;
        }
        @keyframes resultAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-left: 5px solid var(--primary);
            transition: all 0.3s ease;
            animation: slideIn 0.6s ease-out;
            animation-fill-mode: both;
        }
        .result-card:nth-child(1) { animation-delay: 0.1s; border-left-color: #FFD700; }
        .result-card:nth-child(2) { animation-delay: 0.2s; border-left-color: #C0C0C0; }
        .result-card:nth-child(3) { animation-delay: 0.3s; border-left-color: #CD7F32; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.16);
        }
        
        .rank {
            display: inline-block;
            font-size: 2rem;
            margin-right: 10px;
        }
        
        .shop-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .shop-icon {
            font-size: 2.5rem;
            margin-right: 15px;
        }
        
        .shop-info {
            flex: 1;
        }
        
        .shop-name {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 3px;
        }
        
        .shop-location {
            font-size: 0.8rem;
            color: #999;
        }
        
        .score-badge {
            background: linear-gradient(135deg, var(--accent), #4ECDC4);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            display: inline-block;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(110,207,127,0.3);
        }
        
        .reason {
            background: #FFF8E7;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.7;
            color: #555;
            margin-bottom: 12px;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            background: var(--secondary);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .summary {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            text-align: center;
        }
        
        .summary-title {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }
        
        .summary-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #999;
            font-size: 0.8rem;
        }
        
        .back-btn {
            width: 100%;
            padding: 15px;
            background: #E0E0E0;
            border: none;
            border-radius: 15px;
            color: #666;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #D0D0D0;
        }
    
        /* ── フロアマップモーダル ── */
        .map-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.82);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .map-modal.show { display: flex; }
        .map-box {
            background: #fff;
            border-radius: 18px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .map-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(135deg,#FF8C61,#FFB347);
            color: #fff;
            font-weight: 900;
            font-size: 1rem;
        }
        .map-close {
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            font-size: 1.1rem;
            cursor: pointer;
            color: #fff;
            font-weight: 900;
        }
        .map-floor-tabs {
            display: flex;
            background: #f5f5f5;
        }
        .map-floor-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #999;
            transition: all 0.2s;
        }
        .map-floor-tab.active {
            background: #fff;
            color: #FF8C61;
            border-bottom: 3px solid #FF8C61;
        }
        .map-wrap {
            position: relative;
            overflow: auto;
            flex: 1;
        }
        .map-img {
            width: 100%;
            display: block;
        }
        .map-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .map-marker-dot {
            width: 22px; height: 22px;
            background: #FF3B30;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(255,59,48,0.7);
            animation: mapPulse 1.2s infinite;
        }
        @keyframes mapPulse {
            0%   { box-shadow: 0 0 0 0   rgba(255,59,48,0.7); }
            70%  { box-shadow: 0 0 0 16px rgba(255,59,48,0); }
            100% { box-shadow: 0 0 0 0   rgba(255,59,48,0); }
        }
        .map-marker-label {
            background: #FF3B30;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 8px;
            margin-top: 3px;
            white-space: nowrap;
            max-width: 100px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .map-footer {
            padding: 10px 16px;
            font-size: 0.75rem;
            color: #999;
            text-align: center;
            border-top: 1px solid #eee;
        }
        /* 店舗名クリック可能スタイル */
        .shop-name-link {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .shop-name-link:hover { text-decoration: underline; }
        .map-pin-icon { font-size: 0.85em; }

        </style>
</head>

const KYUSEI_LIST = ['一白水星','二黒土星','三碧木星','四緑木星','五黄土星','六白金星','七赤金星','八白土星','九紫火星'];

  '五黄土星':'土','六白金星':'金','七赤金星':'金','八白土星':'土','九紫火星':'火'
};

// ── 本命星（生年から算出：翌節分年で計算）──
// 晃平さん: 1993/4/14生 → 立春後なので1993年 → 桁和4 → (11-4)%9=7 → 七赤金星 ✅
// ※ユーザー確認済み固定値
const BIRTH_KYUSEI = '七赤金星';
const BIRTH_KYUSEI_ELEMENT = '金';
const BIRTH_MONTH_KYUSEI = '四緑木星'; // 月命星(4月生まれ)
const BIRTH_MONTH_ELEMENT = '木';

// ── 年盤中宮星（立春〜翌立春）──
// オフセット+3で検証済み (2026→一白水星 ✅, 2025→五黄土星 ✅)
function getYearBoard(now) {
  // 立春(2/4頃)前は前年扱い
  const y = (now.getMonth() < 1 || (now.getMonth() === 1 && now.getDate() < 4)) 
    ? now.getFullYear() - 1 : now.getFullYear();
  const ep = Math.floor(Date.UTC(y,0,1) / 86400000);
  return KYUSEI_LIST[(ep + 3) % 9];
}

// ── 月盤中宮星（節入り日テーブル）──
// 各年の寅月(立春)から陰遁で毎月-1
function getMonthBoard(now) {
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  // ═══ keisan.site準拠・完全正確版 (2024-2030) ═══
  const SETSU_TABLE_M = {
    2024:[6,4,5,4,5,5,7,7,7,8,7,7],
    2025:[5,3,5,4,5,5,7,7,7,8,7,7],
    2026:[5,4,5,5,5,6,7,7,7,8,7,7],
    2027:[6,4,6,5,5,6,7,7,8,8,7,7],
    2028:[6,4,5,4,5,5,7,7,7,8,7,7],
    2029:[5,3,5,4,5,5,7,7,7,8,7,7],
    2030:[5,4,6,5,5,6,7,8,8,8,7,7],
  };
  const TIGER_IDX_M = {'一白水星':7,'二黒土星':4,'三碧木星':1,'四緑木星':7,'五黄土星':4,'六白金星':1,'七赤金星':7,'八白土星':4,'九紫火星':1};
  const setsu = SETSU_TABLE_M[y] || SETSU_TABLE_M[2026];
  let mn = d >= setsu[m-1] ? m-1 : m-2;
  if(mn<=0) mn+=12;
  const ti = TIGER_IDX_M[getYearBoard(now)];
  return KYUSEI_LIST[((ti-(mn-1))%9+9)%9];
}

// ════════════════════════════════════════════════════════════
//  日家九星（陰遁陽遁・標準則）
//  旧実装は (epochDays+5)%9 の単純な日数カウントで、陰遁陽遁が未実装だった。
//  実例: 2026-07-14 を八白土星と誤算（正解は二黒土星）。この値は
//  getKyuseiDayScore → 風水スコア経由でフード推薦の順位に影響していた。
//
//  正: 冬至に最も近い甲子日から陽遁（一白水星から順行 +1）、
//      夏至に最も近い甲子日から陰遁（九紫火星から逆行 -1）。
//      至日との距離が等しい場合は至日前の甲子を優先。
//  甲子日はユリウス日から算出（アンカー: 1970-01-01 = 辛巳 = 六十干支 index17）。
//  至日は既存の天文エンジン _solarTermUT（angle=90/270）を流用（新規計算を作らない）。
//  検証: 2026-07-13=三碧木星 / 2026-07-14=二黒土星 / 2026-07-15=一白水星
// ════════════════════════════════════════════════════════════
function _epochDayK(date) {
  return Math.floor(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) / 86400000);
}
// 六十干支番号（0=甲子）。1970-01-01(epoch 0) → 17 = 辛巳
function _kanshiIdxK(date) {
  return ((_epochDayK(date) + 17) % 60 + 60) % 60;
}
// 夏至(黄経90°)のJST。冬至は既存の _wsJST(angle=270) を使う
function _ssJST(gy) { return _solarTermUT(2451545 + 365.2422 * (gy - 2000) + 172, 90) + 9 / 24; }
// JST のユリウス日 → epochDay
function _epFromJstJd(j) { return _civilDay(j) - 2440588; }
// 至日に最も近い甲子日の epochDay（甲子は epochDay ≡ 43 mod 60。等距離なら至日前を優先）
function _nearestKoshiEp(solEp) {
  const base = ((solEp - 43) % 60 + 60) % 60;
  const prev = solEp - base, next = prev + 60;
  return ((solEp - prev) <= (next - solEp)) ? prev : next;
}
const _koshiCache = {};
function _koshiAnchors(gy) {
  if (_koshiCache[gy]) return _koshiCache[gy];
  return _koshiCache[gy] = [
    { ep: _nearestKoshiEp(_epFromJstJd(_wsJST(gy))), inton: false }, // 冬至 → 陽遁（一白順行）
    { ep: _nearestKoshiEp(_epFromJstJd(_ssJST(gy))), inton: true  }, // 夏至 → 陰遁（九紫逆行）
  ];
}
function getDayKyusei(date) {
  const ep = _epochDayK(date), gy = date.getFullYear();
  let cands = [];
  for (let yy = gy - 1; yy <= gy + 1; yy++) cands = cands.concat(_koshiAnchors(yy));
  const active = cands.filter(a => a.ep <= ep).sort((a, b) => b.ep - a.ep)[0];
  let idx;
  if (!active) {
    idx = ((ep + 5) % 9 + 9) % 9;                 // 理論上到達しない保険
  } else {
    const n = ep - active.ep;
    idx = active.inton ? ((8 - n) % 9 + 9) % 9    // 陰遁: 九紫(idx8)から逆行
                       : ((n) % 9 + 9) % 9;       // 陽遁: 一白(idx0)から順行
  }
  const name = KYUSEI_LIST[idx];
  const elem = KYUSEI_ELEMENT[name] || '土';
  return { name, elem };
}

// ════════════════════════════════════════════════════════════
//  機能強化: 別の候補 / 被り回避 / 共有
//  スコア計算式には一切触れない。候補の「提示順」と履歴のみを扱う。
// ════════════════════════════════════════════════════════════
const LFN_HIST_KEY = 'lfn_hist';    // 直近7件の採用履歴
const LFN_AVOID_KEY = 'lfn_avoid';  // 被り回避 ON/OFF（既定ON。'0'のときだけOFF）
const LFN_HIST_MAX = 7;
const LFN_AVOID_DAYS = 3;           // 直近何日分を被りとみなすか
const LFN_MIN_CANDIDATES = 3;       // 候補がこれ未満なら被り回避を無効化

let _candList = [];        // 当日の候補順（スコア順 → 被り回避で降格適用）
let _candIdx  = 0;         // 現在の候補位置
let _lastOpenShops = [];   // 被り回避のON/OFF切替時に候補順を組み直すための元データ

function lfnDateKey(d) {
  return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
}
function lfnHist() {
  try { const a = JSON.parse(localStorage.getItem(LFN_HIST_KEY) || '[]'); return Array.isArray(a) ? a : []; }
  catch (e) { return []; }
}
function lfnAvoidOn() {
  try { return localStorage.getItem(LFN_AVOID_KEY) !== '0'; } catch (e) { return true; }
}
function lfnSetAvoid(on) {
  try { localStorage.setItem(LFN_AVOID_KEY, on ? '1' : '0'); } catch (e) {}
}
function lfnPushHist(shopName, foodName) {
  const key = lfnDateKey(new Date());
  const h = lfnHist().filter(x => x && x.date !== key);   // 同日分は最新で置き換える
  h.unshift({ date: key, shop: shopName, food: foodName });
  try { localStorage.setItem(LFN_HIST_KEY, JSON.stringify(h.slice(0, LFN_HIST_MAX))); } catch (e) {}
}
// 直近 LFN_AVOID_DAYS 日（今日は含めない）に採用した店舗名の集合
function lfnRecentShops() {
  const keys = [];
  for (let i = 1; i <= LFN_AVOID_DAYS; i++) {
    const d = new Date(); d.setDate(d.getDate() - i); keys.push(lfnDateKey(d));
  }
  return lfnHist().filter(x => x && keys.indexOf(x.date) >= 0).map(x => x.shop);
}
// 候補順を組み立てる。除外ではなく「後ろへ降格」。スコアも表示順位も変えない
function lfnBuildCandidates(openShops) {
  if (!lfnAvoidOn() || openShops.length < LFN_MIN_CANDIDATES) return openShops.slice();
  const recent = lfnRecentShops();
  const fresh = openShops.filter(s => recent.indexOf(s.name) < 0);
  const used  = openShops.filter(s => recent.indexOf(s.name) >= 0);
  if (!fresh.length) return openShops.slice();   // 全店が被りなら降格しても意味がないので無効
  return fresh.concat(used);
}
function lfnFoodOf(shop) { return (shop.tags && shop.tags[0]) || shop.genre || ''; }

function lfnShareText() {
  const s = _candList[_candIdx];
  if (!s) return '';
  const now = new Date();
  const dir = SHOP_DIRECTION[s.name] || '中央';
  return '🍽 今日のラッキーフード ' + (now.getMonth() + 1) + '/' + now.getDate()
       + ' ' + getRokuyo(now) + '\n' + s.name + 'の' + lfnFoodOf(s) + '（方位:' + dir + '）';
}
// iOS PWA 対策: クリックハンドラ内で非同期処理を挟まず、share を同期的に呼ぶ
function lfnShare(btn) {
  const text = lfnShareText();
  if (!text) return;
  if (navigator.share) {
    navigator.share({ text: text }).catch(function () {});   // ← await を挟まない
    return;
  }
  const done = function () {
    const old = btn.textContent;
    btn.textContent = '✅ コピーしました';
    setTimeout(function () { btn.textContent = old; }, 1600);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, function () {});
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
  }
}
function lfnCycleCandidate() {
  if (!_candList.length) return;
  _candIdx = (_candIdx + 1) % _candList.length;   // 最下位まで行ったら先頭に戻る
  lfnRenderFeatured();
}
function lfnToggleAvoid(cb) {
  lfnSetAvoid(cb.checked);
  if (!_lastOpenShops.length) return;
  // 表示中のランキングはスコア順のまま。候補順だけ組み直して先頭へ戻す
  _candList = lfnBuildCandidates(_lastOpenShops);
  _candIdx = 0;
  lfnRenderFeatured();
}

function lfnRenderFeatured() {
  const s = _candList[_candIdx];
  if (!s) return;
  const nameEl = document.getElementById('featuredShop');
  const navEl  = document.getElementById('candNav');
  if (nameEl) nameEl.innerHTML = s.emoji + ' ' + s.name + 'の' + lfnFoodOf(s);
  if (navEl)  navEl.textContent = '第' + (_candIdx + 1) + '候補/' + _candList.length + '件中';
  lfnPushHist(s.name, lfnFoodOf(s));
}

// マップ画像が未アップの場合の代替表示
function mapImgError(img) {
  if (img.dataset.errShown === '1') return;
  img.dataset.errShown = '1';

  const mingIdx=((2+bMonth-1-hBranchIdx)%12+12)%12;
  const BASE={甲:0,己:0,乙:2,庚:2,丙:4,辛:4,丁:6,壬:6,戊:8,癸:8};
  const mingStem=STEMS_F[((BASE[yearStem]||0)+mingIdx)%10];
  return KYOKU_NUM_F[KYOKU_ELEM_F[mingStem]||'木']||3;
}
const BIRTH_KYOKU_F = getKyoku_F(); // 3局（固定）

function getNumerologyDayBonus_F(date) {
  const LIFE_PATH=4; // 1993/4/14→4
  const m=date.getMonth()+1,d=date.getDate();
  let s=LIFE_PATH+m+d;
  while(s>9&&s!==11&&s!==22&&s!==33) s=[...String(s)].reduce((a,c)=>a+parseInt(c),0);
  return {9:5,8:4,7:4,6:4,3:4,11:6,22:6,33:6}[s]||2;
}

function getDayPillarStem_F(date) {
  const STEMS_L=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const epochDays=Math.floor(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())/86400000);
  return STEMS_L[((epochDays+17)%10+10)%10];
}

function getAdditionalFortuneBonusFull(now) {
  // 通変星ボーナス（日干×本命乙の通変星）
  const dStem=getDayPillarStem_F(now);
  const ts={'印綬':8,'正官':7,'正財':6,'食神':5,'比肩':4,'偏印':4,'偏官':3,'劫財':2,'傷官':2,'偏財':2};
  const tsuhen=getTsuhensei_F('乙',dStem);
  const tsBonus=ts[tsuhen]||3;
  // 紫微斗数局数ボーナス（固定: 火6局→最高）
  const kyokuBonus={6:8,5:6,4:5,3:3,2:2}[BIRTH_KYOKU_F]||3;
  // 個人日数ボーナス
  const numBonus=getNumerologyDayBonus_F(now);
  return tsBonus+kyokuBonus+numBonus;
}

function calculateRestaurantScores(now) {
    const h = now.getHours();
    const moonPhase = getMoonPhase(now);
    const rokuyo = getRokuyo(now);
    const kds = getKyuseiDayScore(now);

    // ── 共通占術スコア（0〜40点・全店共通）──
    const rokuyoPt = {'大安':8,'友引':6,'先勝':5,'先負':3,'赤口':1,'仏滅':0}[rokuyo]||4;
    const moonPt = {'満月':8,'新月':7,'十三夜の月':6,'上弦の月':5,'更待月':5,'三日月':4,'下弦の月':3,'有明月':2}[moonPhase.phase]||4;
    const kyuseiPt = Math.round(Math.max(0, Math.min(8, (kds.total + 6) / 2)));
    const fortunePt = Math.min(16, getAdditionalFortuneBonusFull(now));
    const commonScore = rokuyoPt + moonPt + kyuseiPt + fortunePt; // 0〜40

    // ── 各店舗スコア計算 ──
    const rawScores = restaurants.map(shop => {
        const isOpen = h >= shop.hours.open && h < shop.hours.close;

        // 1. エレメント相性 (0〜12)
        const elemPt = Math.max(0, getElementCompatibility(userData.element, shop.element) + 6);

        // 2. 時間帯×ジャンル適合 (0〜14)
        let timePt = 0;
        if (h >= 7 && h < 11) {
            if (shop.genre.includes('カフェ')) timePt=14;
            else if (shop.genre.includes('パン')||shop.genre.includes('サンド')) timePt=10;
            else timePt=3;

        } else if (h >= 11 && h < 15) {
            if (shop.genre.includes('定食')||shop.genre.includes('海鮮')) timePt=14;
            else if (shop.genre.includes('うどん')||shop.genre.includes('ラーメン')) timePt=12;
            else if (shop.genre.includes('カフェ')||shop.genre.includes('洋食')) timePt=8;
            else timePt=5;
            if (shop.name.includes('丸亀')||shop.name.includes('源ちゃん')) timePt=Math.min(14,timePt+2);
        } else if (h >= 15 && h < 18) {
            if (shop.genre.includes('スイーツ')||shop.genre.includes('クレープ')) timePt=14;
            else if (shop.genre.includes('カフェ')) timePt=12;
            else if (shop.genre.includes('フルーツ')) timePt=10;
            else timePt=3;
        } else if (h >= 18 && h < 22) {
            if (shop.genre.includes('ラーメン')||shop.genre.includes('焼肉')||shop.genre.includes('ステー')) timePt=14;
            else if (shop.genre.includes('レストラン')||shop.genre.includes('和食')) timePt=12;
            else if (shop.genre.includes('居酒屋')||shop.genre.includes('鍋')) timePt=10;
            else timePt=4;
        } else {
            if (shop.name.includes('マクドナルド')) timePt=14;
            else if (shop.genre.includes('カフェ')) timePt=6;
            else timePt=2;
        }

        // 3. 店舗固有sin（全店ユニーク float、-23〜+23）
        const shopHash = shop.name.split("").reduce((a,cc) => ((a*31 + cc.charCodeAt(0)) & 0x7FFFFFFF), 0);
        const dailySeed = now.getFullYear()*10000+(now.getMonth()+1)*100+now.getDate();
        const moonAge = moonPhase.age||0;
        const sig1 = Math.sin(shopHash*0.7853981 + dailySeed*0.137)*10;
        const sig2 = Math.sin(shopHash*1.2345678 + dailySeed*0.071)*8;
        const sig3 = Math.sin(shopHash*2.7182818  + moonAge*0.15 + dailySeed*0.031)*5;
        const shopUnique = sig1+sig2+sig3;

        // 4. 風水 (-3〜+12)
        const fengPt = getFengShuiScore(shop.name, now);

        // 5. 日盤×店舗エレメント (-3〜+4)
        const dayKyuseiNow = getDayKyusei(now);
        const SHOP_ELEM_COMPAT = {'火':{'火':4,'土':2,'水':-3,'金':-2,'木':3,'風':1},'水':{'水':4,'金':3,'木':2,'火':-3,'土':-2,'風':1},'木':{'木':4,'水':3,'火':2,'金':-3,'土':-2,'風':1},'金':{'金':4,'土':3,'水':2,'木':-3,'火':-2,'風':1},'土':{'土':4,'火':3,'金':2,'水':-3,'木':-2,'風':1},'風':{'風':4,'木':2,'火':2,'水':1,'土':1,'金':1}};
        const dElem = dayKyuseiNow.elem;
        const dayShopPt = (SHOP_ELEM_COMPAT[dElem]&&SHOP_ELEM_COMPAT[dElem][shop.element])||0;

        const raw = commonScore + elemPt + timePt + shopUnique + fengPt + dayShopPt;
        return { ...shop, raw, isOpen };
    });

    // ── min-max正規化 → 60.0〜99.9にマッピング（全店ユニーク）──
    const raws = rawScores.map(s => s.raw);
    const minR = Math.min(...raws), maxR = Math.max(...raws);
    const range = maxR - minR || 1;
    return rawScores.map(s => ({
        ...s,
        score: Math.round((60 + (s.raw - minR) / range * 39.9) * 10) / 10
    })).sort((a,b) => b.score - a.score);
}

function generateReason(shop, rank, now) {
    const reasons = [];
    const h = now.getHours();
    const rokuyo = getRokuyo(now);
    const moonPhase = getMoonPhase(now);
    
    // エレメント
    const elementMsg = {
        '火':'火のエレメント同士で運気が共鳴します',
        '土':'土のエレメントが安定感をもたらします',
        '風':'風のエレメントが軽やかな運気を運びます',
        '水':'水のエレメントが浄化と癒しをもたらします'
    };
    reasons.push(elementMsg[shop.element]);
    
    // 時間帯
    if (h >= 7 && h < 11) reasons.push('朝の運気が高まる時間帯です');
    else if (h >= 11 && h < 15) reasons.push('ランチタイムの黄金時間帯です');
    else if (h >= 15 && h < 18) reasons.push('午後のリフレッシュに最適です');
    else if (h >= 18 && h < 22) reasons.push('夕食の運気が絶頂です');
    
    // 六曜
    if (rokuyo === '大安') reasons.push('大安の吉日パワー');
    else if (rokuyo === '友引') reasons.push('友引で良縁を引き寄せます');
    
    // 月相
    const moonMsg = {
        '満月':'満月のエネルギーが最高潮',
        '新月':'新月の浄化と再生パワー',
        '更待月':'更待月の余韻が運気を持続',
        '三日月':'三日月の希望エネルギー',
        '上弦の月':'上弦月の行動力が高まる',
        '十三夜の月':'十三夜の期待感が高まる',
        '下弦の月':'下弦月の手放しと整理',
        '有明月':'有明月の内省と準備',
    };
    if (moonMsg[moonPhase.phase]) reasons.push(moonMsg[moonPhase.phase]);
    
    // ランク別
    if (rank === 1) reasons.push('今日のあなたに最も相性が良い店です');
    
    // 九星三層（本命星×年盤×月盤×日盤）
    const kds2 = getKyuseiDayScore(now);
    const relLabel = kds2.total >= 6 ? '大吉✨' : kds2.total >= 0 ? '吉' : kds2.total >= -3 ? '注意' : '凶⚠';
    const dRelLabel = (kds2.dScore || 0) >= 6 ? '大吉' : (kds2.dScore || 0) >= 0 ? '吉' : '注意';
    const fengDir2 = SHOP_DIRECTION[shop.name];
    const kyuseiMsg = '本命星(七赤金星)×月盤(' + (kds2.monthBoard||'').slice(0,2) + ')×日盤(' + (kds2.dayBoard||'').slice(0,2) + ')=' + relLabel;
    if (fengDir2 && fengDir2 !== '中央') {
        reasons.push('風水(' + fengDir2 + '方位)×' + kyuseiMsg);
    } else {
        reasons.push(kyuseiMsg);
    }
    return reasons.join('。') + '。';
}

function openMap(shopName) {
    const pos = SHOP_MAP_POS[shopName];
    const modal = document.getElementById('mapModal');
    document.getElementById('mapShopName').textContent = '\u{1F4CD} ' + shopName;
    document.getElementById('mapMarkerLabel').textContent = shopName;
    const floor = pos ? pos.floor : '1F';
    modal.classList.add('show');
    switchMapFloor(floor, pos);
    setTimeout(scrollToMarker, 400);
}
function switchMapFloor(floor, pos) {
    const img1F = document.getElementById('mapImg1F');
    const img2F = document.getElementById('mapImg2F');
    document.getElementById('tab1F').className = 'map-floor-tab' + (floor==='1F'?' active':'');
    document.getElementById('tab2F').className = 'map-floor-tab' + (floor==='2F'?' active':'');
    img1F.style.display = floor==='1F'?'block':'none';
    img2F.style.display = floor==='2F'?'block':'none';
    if(!pos){ const name = document.getElementById('mapShopName').textContent.replace('\u{1F4CD} ',''); pos = SHOP_MAP_POS[name]; }
    placeMarker(pos, floor);
}
function placeMarker(pos, floor) {
    const marker = document.getElementById('mapMarker');
    const wrap   = document.getElementById('mapWrap');
    if(!pos || pos.floor !== floor){ marker.style.display='none'; return; }
    const imgEl = floor==='1F' ? document.getElementById('mapImg1F') : document.getElementById('mapImg2F');
    const iw = imgEl.clientWidth  || 400;
    const ih = imgEl.clientHeight || (iw*848/1200);
    marker.style.left    = (iw * pos.x / 100) + 'px';
    marker.style.top     = (ih * pos.y / 100) + 'px';
    marker.style.display = 'block';
}
function scrollToMarker() {
    const wrap   = document.getElementById('mapWrap');
    const marker = document.getElementById('mapMarker');
    if(marker.style.display==='none') return;
    const mx = parseFloat(marker.style.left)||0;
    const my = parseFloat(marker.style.top)||0;
    wrap.scrollTo({ left: Math.max(0,mx-wrap.clientWidth/2), top: Math.max(0,my-wrap.clientHeight/2), behavior:'smooth' });
}
function closeMap(){ document.getElementById('mapModal').classList.remove('show'); }
['mapImg1F','mapImg2F'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.addEventListener('load', function(){
        var name = document.getElementById('mapShopName').textContent.replace('\u{1F4CD} ','');
        var pos2 = SHOP_MAP_POS[name];
        var fl = id==='mapImg1F' ? '1F' : '2F';
        if(pos2 && pos2.floor===fl && this.style.display!=='none') placeMarker(pos2,fl);
    });
});

      <button class="map-close" onclick="closeMap()">✕</button>
    </div>
    <div class="map-floor-tabs">
      <button class="map-floor-tab" id="tab1F" onclick="switchMapFloor('1F')">1F</button>
      <button class="map-floor-tab" id="tab2F" onclick="switchMapFloor('2F')">2F</button>
    </div>
    <div class="map-wrap" id="mapWrap">
      <img id="mapImg1F" class="map-img" src="./map_1f.webp" loading="lazy" decoding="async" alt="マップ画像が見つかりません（map_1f.webpをリポジトリにアップしてください）" onerror="mapImgError(this)" alt="1Fフロアマップ" style="display:none">
      <img id="mapImg2F" class="map-img" src="./map_2f.webp" loading="lazy" decoding="async" alt="マップ画像が見つかりません（map_2f.webpをリポジトリにアップしてください）" onerror="mapImgError(this)" alt="2Fフロアマップ" style="display:none">
      <div class="map-marker" id="mapMarker" style="display:none">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="map-marker-dot"></div>
          <div class="map-marker-label" id="mapMarkerLabel"></div>
        </div>
      </div>
    </div>
    <div class="map-footer">📍 赤いマーカーが店舗位置です。マップをスクロールして確認できます。</div>
  </div>
</div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function (e) { console.warn('SW登録失敗', e); });
        });
      }
    </script>
</body>
