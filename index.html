            --secondary: #FFD93D;

            --deep: #2C3E50;

            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-deco {

            pointer-events: none;
            z-index: 0;
        }
        .star { 
            position: absolute;
            animation: twinkle 3s infinite;
            font-size: 1.5rem;
            opacity: 0.3;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        .food-float {
            position: absolute;
            font-size: 2rem;
            animation: float 15s infinite linear;
            opacity: 0.15;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            font-size: 0.9rem;
            color: #666;
            font-weight: 700;
        }
        
        .time-display {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .time-label {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 5px;
            letter-spacing: 0.1em;
        }
        
        .time-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            font-family: 'Zen Maru Gothic', sans-serif;
        }
        
        .fortune-btn {
            width: 100%;
            padding: 25px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            font-family: 'Zen Maru Gothic', sans-serif;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .fortune-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .fortune-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .fortune-btn:active {
            transform: scale(0.98);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.show { display: block; }
        
        .loading-icon {
            font-size: 4rem;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 15px;
            font-size: 1rem;
            color: #666;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .result {
            display: none;
        }
        .result.show {
            display: block;
            animation: resultAppear 0.8s ease-out;
        }
        @keyframes resultAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-left: 5px solid var(--primary);

            from { opacity: 0; transform: translateX(-30px); }

            transform: translateY(-5px);

        }

            font-size: 2rem;
            margin-right: 10px;
        }

</head>

// 九星気学：本命星
// 九星気学 本命星: 桁和1桁→(11-sum)%9
// 1993: 1+9+9+3=22→4 (11-4)%9=7 → 七赤金星 ✅
function getKyusei(birthYear) {
    let s = String(birthYear).split('').reduce((a,c)=>a+parseInt(c),0);
    while(s >= 10) s = String(s).split('').reduce((a,c)=>a+parseInt(c),0);
    const stars = ['九紫火星','一白水星','二黒土星','三碧木星','四緑木星','五黄土星','六白金星','七赤金星','八白土星'];
    return stars[(11 - s) % 9];
}

// 数秘術：ライフパス
function getLifePath(birthdate) {
    const digits = birthdate.replace(/-/g,'').split('').map(Number);
    let sum = digits.reduce((a,b)=>a+b,0);
    while (sum > 9 && sum !== 11 && sum !== 22) {
        sum = String(sum).split('').map(Number).reduce((a,b)=>a+b,0);
    }
    return sum;
}

// 四柱推命：日干
// 四柱推命 日干: epochDays+17オフセット（lucky-girl検証済み）
// 2026/3/5: epochDay=20517 (20517+17)%10=4 → 戊 ✅
function getDayKan(now) {
    const epochDays = Math.floor(Date.UTC(now.getFullYear(),now.getMonth(),now.getDate())/86400000);
    const kans = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    return kans[((epochDays + 17) % 10 + 10) % 10];
}

// 月相計算
// 月相計算: JDエポック基準法 StarWalk宮崎市実測検証済み
// EPOCH 2451549.759 (+0.5日補正) → 3/3=14.4日(満月) 3/4=14.9日(更待月) ✅
function getMoonPhase(now) {
    const EPOCH_JD = 2451549.759, SYNODIC = 29.530589;
    const ms  = (now instanceof Date) ? now.getTime() : now;
    const jd  = ms / 86400000 + 2440587.5;
    const frac = (((jd - EPOCH_JD) / SYNODIC) % 1 + 1) % 1;
    const age  = Math.round(frac * SYNODIC * 10) / 10;
    // StarWalk 8フェーズ準拠
    if (age <= 1.0 || age >= 28.5) return { phase:'新月',     emoji:'🌑', bonus:6, age };
    if (age <= 6.5)                return { phase:'三日月',   emoji:'🌒', bonus:4, age };
    if (age <= 8.5)                return { phase:'上弦の月', emoji:'🌓', bonus:5, age };
    if (age <= 13.8)               return { phase:'十三夜',   emoji:'🌔', bonus:6, age };
    if (age <= 14.8)               return { phase:'満月',     emoji:'🌕', bonus:8, age };
    if (age <= 22.0)               return { phase:'更待月',   emoji:'🌖', bonus:5, age };
    if (age <= 25.0)               return { phase:'下弦の月', emoji:'🌗', bonus:4, age };
    return                                { phase:'有明月',   emoji:'🌘', bonus:3, age };
}

// エレメント相性
function getElementCompatibility(userElement, shopElement) {
    const compat = {
        '火': { '火':10, '土':8, '風':9, '水':5, '木':7 },
        '土': { '火':8, '土':10, '風':6, '水':7, '木':9 },
        '風': { '火':9, '土':6, '風':10, '水':8, '木':8 },
        '水': { '火':5, '土':7, '風':8, '水':10, '木':9 },
        '木': { '火':7, '土':9, '風':8, '水':9, '木':10 },
    };
    return compat[userElement][shopElement] || 7;
}

// ========== メイン計算関数 ==========
function calculateRestaurantScores(now) {
    const h = now.getHours();
    const zData = zodiacBase[userData.zodiac];
    
    // 基本運気
    let baseScore = zData.base;
    baseScore += bloodBonus[userData.bloodType];
    baseScore += etoBonus[userData.eto];
    baseScore += dayBonus[now.getDay()];
    
    // 数秘術・月相
    const lp = getLifePath(userData.birthdate);
    const moonPhase = getMoonPhase(now);
    baseScore += (lp % 5) + moonPhase.bonus;
    
    // 六曜
    const rokuyo = getRokuyo(now);
    const rokuyoBonus = {'大安':8,'友引':5,'先勝':4,'先負':3,'赤口':2,'仏滅':1};
    baseScore += (rokuyoBonus[rokuyo] || 4);
    
    // 各店舗のスコア計算
    return restaurants.map(shop => {
        let score = baseScore;
        
        // 営業時間チェック
        const isOpen = h >= shop.hours.open && h < shop.hours.close;
        if (!isOpen) score -= 50; // 営業時間外は大幅減点
        
        // エレメント相性
        score += getElementCompatibility(userData.element, shop.element);
        
        // 時間帯スコア
        score += getHourScore(h);
        
        // ジャンル別補正（時間帯による）
        if (h >= 7 && h < 11) { // 朝食
            if (shop.genre.includes('カフェ')) score += 10;
            if (shop.name.includes('コメダ')) score += 5;
        } else if (h >= 11 && h < 15) { // 昼食
            if (shop.genre.includes('うどん') || shop.genre.includes('定食') || shop.genre.includes('海鮮')) score += 10;
            if (shop.name.includes('丸亀') || shop.name.includes('源ちゃん')) score += 5;
        } else if (h >= 15 && h < 18) { // おやつ
            if (shop.genre.includes('スイーツ') || shop.genre.includes('クレープ') || shop.genre.includes('カフェ')) score += 10;
            if (shop.name.includes('ディッパーダン')) score += 5;
        } else if (h >= 18 && h < 22) { // 夕食
            if (shop.genre.includes('ラーメン') || shop.genre.includes('レストラン')) score += 10;
        } else { // 深夜・早朝
            if (shop.name.includes('マクドナルド')) score += 15;
        }
        
        // 店舗ごとに異なる日次ランダム補正（全店が毎日ローテーション）
        const shopHash = shop.name.split('').reduce((a,c) => a*31 + c.charCodeAt(0), 0);
        const dailySeed = now.getFullYear()*10000 + (now.getMonth()+1)*100 + now.getDate();
        const randBonus = ((shopHash * 1009 + dailySeed * 7) % 17) - 8;
        score += randBonus;
        
        // 月相による店舗個別補正（六曜×月相×店舗の3つ組みで毎日変化）
        const moonShopSeed = (moonPhase.age ? Math.floor(moonPhase.age) : 0);
        const moonRand = ((shopHash + moonShopSeed * 13) % 9) - 4;
        score += moonRand;
        
        return {
            ...shop,
            score: Math.min(99, Math.max(60, Math.round(score))),
            isOpen
        };
    }).sort((a,b) => b.score - a.score);
}

        if (openShops.length > 0) {
            html += '<div class="summary-title" style="text-align:center;margin:16px 0 8px;font-size:1rem;">🍽️ 今すぐ行ける店ランキング</div>';
            openShops.forEach((shop, i) => {
                const medal = i < 3 ? medals[i] : `${i+1}位`;
                const scoreColor = shop.score >= 90 ? '#FF6B6B' : shop.score >= 80 ? '#FF8C61' : '#FFB347';
                html += `
                <div class="result-card">
                    <div class="shop-header">
                        <div class="rank">${medal}</div>
                        <div class="shop-icon">${shop.emoji}</div>
                        <div class="shop-info">
                            <div class="shop-name">${shop.name}</div>
                            <div class="shop-location">${shop.floor} ／ ${shop.genre}</div>
                        </div>
                    </div>
                    <div class="score-badge" style="background:${scoreColor};">運気スコア：${shop.score}点</div>
                    <div class="reason">${generateReason(shop, i+1, now)}</div>
                    <div class="tags">${shop.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
                </div>`;
            });
        }
        
        // ── 営業時間外の店舗（折りたたみ表示） ──
        if (closedShops.length > 0) {
            html += `
            <details style="margin-top:12px;">
                <summary style="cursor:pointer;background:#f5f5f5;border-radius:12px;padding:10px 16px;font-size:0.85rem;color:#999;">
                    ⏰ 現在営業時間外の店舗（${closedShops.length}店）
                </summary>`;
            closedShops.forEach((shop, i) => {
                html += `
                <div class="result-card" style="opacity:0.6;">
                    <div class="shop-header">
                        <div class="rank" style="font-size:0.85rem;">${i+1}位</div>
                        <div class="shop-icon">${shop.emoji}</div>
                        <div class="shop-info">
                            <div class="shop-name">${shop.name}</div>
                            <div class="shop-location">${shop.floor} ／ 営業時間: ${shop.hours.open}:00〜${shop.hours.close}:00</div>
                        </div>
                    </div>
                    <div class="score-badge" style="background:#ccc;">運気スコア：${shop.score}点</div>
                    <div class="tags">${shop.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
                </div>`;
            });
            html += '</details>';
        }
        
        html += '<button class="back-btn" onclick="startFortune()">🔮 再占い</button>';
        
        document.getElementById('result').innerHTML = html;
        document.getElementById('loading').classList.remove('show');
        document.getElementById('result').classList.add('show');
    }, 1800);
}
</script>
</body>
</html>
