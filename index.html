<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ Lucky Food Navigator</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #FFD93D;
            --accent: #6BCF7F;
            --deep: #2C3E50;
            --text: #2C3E50;
            --bg: #FFF8E7;
            --card: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE5B4 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 背景装飾 */
        .bg-deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }
        .star { 
            position: absolute;
            animation: twinkle 3s infinite;
            font-size: 1.5rem;
            opacity: 0.3;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        .food-float {
            position: absolute;
            font-size: 2rem;
            animation: float 15s infinite linear;
            opacity: 0.15;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            font-size: 0.9rem;
            color: #666;
            font-weight: 700;
        }
        
        .time-display {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .time-label {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 5px;
            letter-spacing: 0.1em;
        }
        
        .time-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            font-family: 'Zen Maru Gothic', sans-serif;
        }
        
        .fortune-btn {
            width: 100%;
            padding: 25px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            font-family: 'Zen Maru Gothic', sans-serif;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .fortune-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .fortune-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .fortune-btn:active {
            transform: scale(0.98);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.show { display: block; }
        
        .loading-icon {
            font-size: 4rem;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 15px;
            font-size: 1rem;
            color: #666;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .result {
            display: none;
        }
        .result.show {
            display: block;
            animation: resultAppear 0.8s ease-out;
        }
        @keyframes resultAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-left: 5px solid var(--primary);
            transition: all 0.3s ease;
            animation: slideIn 0.6s ease-out;
            animation-fill-mode: both;
        }
        .result-card:nth-child(1) { animation-delay: 0.1s; border-left-color: #FFD700; }
        .result-card:nth-child(2) { animation-delay: 0.2s; border-left-color: #C0C0C0; }
        .result-card:nth-child(3) { animation-delay: 0.3s; border-left-color: #CD7F32; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.16);
        }
        
        .rank {
            display: inline-block;
            font-size: 2rem;
            margin-right: 10px;
        }
        
        .shop-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .shop-icon {
            font-size: 2.5rem;
            margin-right: 15px;
        }
        
        .shop-info {
            flex: 1;
        }
        
        .shop-name {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 3px;
        }
        
        .shop-location {
            font-size: 0.8rem;
            color: #999;
        }
        
        .score-badge {
            background: linear-gradient(135deg, var(--accent), #4ECDC4);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            display: inline-block;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(110,207,127,0.3);
        }
        
        .reason {
            background: #FFF8E7;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.7;
            color: #555;
            margin-bottom: 12px;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            background: var(--secondary);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .summary {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            text-align: center;
        }
        
        .summary-title {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }
        
        .summary-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #999;
            font-size: 0.8rem;
        }
        
        .back-btn {
            width: 100%;
            padding: 15px;
            background: #E0E0E0;
            border: none;
            border-radius: 15px;
            color: #666;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #D0D0D0;
        }
    
        /* ── フロアマップモーダル ── */
        .map-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.82);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .map-modal.show { display: flex; }
        .map-box {
            background: #fff;
            border-radius: 18px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .map-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(135deg,#FF8C61,#FFB347);
            color: #fff;
            font-weight: 900;
            font-size: 1rem;
        }
        .map-close {
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            font-size: 1.1rem;
            cursor: pointer;
            color: #fff;
            font-weight: 900;
        }
        .map-floor-tabs {
            display: flex;
            background: #f5f5f5;
        }
        .map-floor-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #999;
            transition: all 0.2s;
        }
        .map-floor-tab.active {
            background: #fff;
            color: #FF8C61;
            border-bottom: 3px solid #FF8C61;
        }
        .map-wrap {
            position: relative;
            overflow: auto;
            flex: 1;
        }
        .map-img {
            width: 100%;
            display: block;
        }
        .map-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .map-marker-dot {
            width: 22px; height: 22px;
            background: #FF3B30;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(255,59,48,0.7);
            animation: mapPulse 1.2s infinite;
        }
        @keyframes mapPulse {
            0%   { box-shadow: 0 0 0 0   rgba(255,59,48,0.7); }
            70%  { box-shadow: 0 0 0 16px rgba(255,59,48,0); }
            100% { box-shadow: 0 0 0 0   rgba(255,59,48,0); }
        }
        .map-marker-label {
            background: #FF3B30;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 8px;
            margin-top: 3px;
            white-space: nowrap;
            max-width: 100px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .map-footer {
            padding: 10px 16px;
            font-size: 0.75rem;
            color: #999;
            text-align: center;
            border-top: 1px solid #eee;
        }
        /* 店舗名クリック可能スタイル */
        .shop-name-link {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .shop-name-link:hover { text-decoration: underline; }
        .map-pin-icon { font-size: 0.85em; }

        </style>
</head>

const KYUSEI_LIST = ['一白水星','二黒土星','三碧木星','四緑木星','五黄土星','六白金星','七赤金星','八白土星','九紫火星'];
const KYUSEI_ELEMENT = {
  '一白水星':'水','二黒土星':'土','三碧木星':'木','四緑木星':'木',
  '五黄土星':'土','六白金星':'金','七赤金星':'金','八白土星':'土','九紫火星':'火'
};

// ── 本命星（生年から算出：翌節分年で計算）──
// 晃平さん: 1993/4/14生 → 立春後なので1993年 → 桁和4 → (11-4)%9=7 → 七赤金星 ✅
// ※ユーザー確認済み固定値
const BIRTH_KYUSEI = '七赤金星';
const BIRTH_KYUSEI_ELEMENT = '金';
const BIRTH_MONTH_KYUSEI = '四緑木星'; // 月命星(4月生まれ)
const BIRTH_MONTH_ELEMENT = '木';

// ── 年盤中宮星（立春〜翌立春）──
// オフセット+3で検証済み (2026→一白水星 ✅, 2025→五黄土星 ✅)
function getYearBoard(now) {
  // 立春(2/4頃)前は前年扱い
  const y = (now.getMonth() < 1 || (now.getMonth() === 1 && now.getDate() < 4)) 
    ? now.getFullYear() - 1 : now.getFullYear();
  const ep = Math.floor(Date.UTC(y,0,1) / 86400000);
  return KYUSEI_LIST[(ep + 3) % 9];
}

// ── 月盤中宮星（節入り日テーブル）──
// 各年の寅月(立春)から陰遁で毎月-1
function getMonthBoard(now) {
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  // ═══ keisan.site準拠・完全正確版 (2024-2030) ═══
  const SETSU_TABLE_M = {
    2024:[6,4,5,4,5,5,7,7,7,8,7,7],
    2025:[5,3,5,4,5,5,7,7,7,8,7,7],
    2026:[5,4,5,5,5,6,7,7,7,8,7,7],
    2027:[6,4,6,5,5,6,7,7,8,8,7,7],
    2028:[6,4,5,4,5,5,7,7,7,8,7,7],
    2029:[5,3,5,4,5,5,7,7,7,8,7,7],
    2030:[5,4,6,5,5,6,7,8,8,8,7,7],
  };
  const TIGER_IDX_M = {'一白水星':7,'二黒土星':4,'三碧木星':1,'四緑木星':7,'五黄土星':4,'六白金星':1,'七赤金星':7,'八白土星':4,'九紫火星':1};
  const setsu = SETSU_TABLE_M[y] || SETSU_TABLE_M[2026];
  let mn = d >= setsu[m-1] ? m-1 : m-2;
  if(mn<=0) mn+=12;
  const ti = TIGER_IDX_M[getYearBoard(now)];
  return KYUSEI_LIST[((ti-(mn-1))%9+9)%9];
}

// ── 五行相生相剋スコア計算 ──
// 本命星(金)と日/月/年盤の関係から総合スコアを出す
const GOGYO_COMPAT = {
  // 自分の五行が金の場合
  '金': { '土':10, '金':8, '水':-2, '木':-3, '火':-6 },
  // 他の五行用（汎用）
  '水': { '金':8, '水':6, '木':-2, '土':-4, '火':-6 },
  '木': { '水':8, '木':6, '火':-2, '金':-5, '土':-3 },
  '火': { '木':8, '火':6, '土':-2, '水':-5, '金':-4 },
  '土': { '火':8, '土':6, '金':-2, '木':-4, '水':-3 },
};

// 日家九星（epochDays+5 keisan.site実測: 3/5=三碧✅ 3/6=四緑✅）
function getDayKyusei(date) {
  const ep = Math.floor(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) / 86400000);
  const name = KYUSEI_LIST[(ep + 5) % 9];
  const elem = KYUSEI_ELEMENT[name] || '土';
  return { name, elem };
}

function getKyuseiDayScore(now) {
  const yearBoard  = getYearBoard(now);
  const monthBoard = getMonthBoard(now);
  const dayKyusei  = getDayKyusei(now); // 日盤追加
  const yElem = KYUSEI_ELEMENT[yearBoard];
  const mElem = KYUSEI_ELEMENT[monthBoard];
  const dElem = dayKyusei.elem;
  const myElem = BIRTH_KYUSEI_ELEMENT; // '金'
  const compat = GOGYO_COMPAT[myElem] || {};

  // 本命星×年盤(重み1) + 本命星×月盤(重み2) + 本命星×日盤(重み3)
  const yScore = compat[yElem] || 0;
  const mScore = compat[mElem] || 0;
  const dScore = compat[dElem] || 0;
  const total  = Math.round((yScore * 1 + mScore * 2 + dScore * 3) / 6);

  return { yearBoard, monthBoard, dayBoard: dayKyusei.name, yElem, mElem, dElem, yScore, mScore, dScore, total };
}


// 風水スコア計算（本命星×年盤×月盤の三層相性を反映）
function getFengShuiScore(shopName, now) {
    const dir = SHOP_DIRECTION[shopName] || '中央';
    // 九星三層スコア: 本命星(七赤金星=金) vs 年盤・月盤
    const kds = getKyuseiDayScore(now);
    const kyuseiBonus = kds.total; // -6〜+10の範囲
    
    // 方位ベースのベーススコア
    // 月盤中宮星の定位置から吉方位を決定
    const monthBoardIdx = KYUSEI_LIST.indexOf(kds.monthBoard);
    const BOARD_LUCKY_DIR = [
        ['南','東南'],   // 一白水星
        ['北東','西'],   // 二黒土星
        ['東','北'],     // 三碧木星
        ['東南','南'],   // 四緑木星
        ['中央'],        // 五黄土星（凶）
        ['北西','西'],   // 六白金星
        ['西','北西'],   // 七赤金星
        ['北東','南西'], // 八白土星
        ['南','東'],     // 九紫火星
    ];
    const luckyDirs = BOARD_LUCKY_DIR[monthBoardIdx] || ['中央'];
    
    let dirScore;
    if (dir === '中央') dirScore = 5;
    else if (luckyDirs.includes(dir)) dirScore = 10;
    else {
        const opp = {'北':'南','南':'北','東':'西','西':'東','北東':'南西','南西':'北東','東南':'北西','北西':'東南'};
        const bad = luckyDirs.map(d => opp[d]).filter(Boolean);
        dirScore = bad.includes(dir) ? -3 : 3;
    }
    // 方位スコア(70%) + 九星三層スコア(30%) を合算
    return Math.round(dirScore * 0.7 + kyuseiBonus * 0.3);
}

// 1993: 1+9+9+3=22→4 (11-4)%9=7 → 七赤金星 ✅
function getKyusei(birthYear) {
    let s = String(birthYear).split('').reduce((a,c)=>a+parseInt(c),0);
    while(s >= 10) s = String(s).split('').reduce((a,c)=>a+parseInt(c),0);
    const stars = ['九紫火星','一白水星','二黒土星','三碧木星','四緑木星','五黄土星','六白金星','七赤金星','八白土星'];
    return stars[(11 - s) % 9];
}

// 数秘術：ライフパス
function getLifePath(birthdate) {
    const digits = birthdate.replace(/-/g,'').split('').map(Number);
    let sum = digits.reduce((a,b)=>a+b,0);
    while (sum > 9 && sum !== 11 && sum !== 22) {
        sum = String(sum).split('').map(Number).reduce((a,b)=>a+b,0);
    }
    return sum;
}

// 月相計算
// 月相計算: JDエポック基準法 StarWalk宮崎市実測検証済み
// EPOCH 2451549.759 (+0.5日補正) → 3/3=14.4日(満月) 3/4=14.9日(更待月) ✅
function getMoonPhase(now) {
    const EPOCH_JD = 2451549.759, SYNODIC = 29.530589;
    const ms  = (now instanceof Date) ? now.getTime() : now;
    const jd  = ms / 86400000 + 2440587.5;
    const frac = (((jd - EPOCH_JD) / SYNODIC) % 1 + 1) % 1;
    const age  = Math.round(frac * SYNODIC * 10) / 10;
    // StarWalk 8フェーズ準拠
    if (age <= 1.0 || age >= 28.5) return { phase:'新月',     emoji:'🌑', bonus:6, age };
    if (age <= 6.5)                return { phase:'三日月',   emoji:'🌒', bonus:4, age };
    if (age <= 8.5)                return { phase:'上弦の月', emoji:'🌓', bonus:5, age };
    if (age <= 13.8)               return { phase:'十三夜',   emoji:'🌔', bonus:6, age };
    if (age <= 14.8)               return { phase:'満月',     emoji:'🌕', bonus:8, age };
    if (age <= 22.0)               return { phase:'更待月',   emoji:'🌖', bonus:5, age };
    if (age <= 25.0)               return { phase:'下弦の月', emoji:'🌗', bonus:4, age };
    return                                { phase:'有明月',   emoji:'🌘', bonus:3, age };
}

        const dElem = dayKyuseiNow.elem;
        const dayShopPt = (SHOP_ELEM_COMPAT[dElem]&&SHOP_ELEM_COMPAT[dElem][shop.element])||0;

        const raw = commonScore + elemPt + timePt + shopUnique + fengPt + dayShopPt;
        return { ...shop, raw, isOpen };
    });

    // ── min-max正規化 → 60.0〜99.9にマッピング（全店ユニーク）──
    const raws = rawScores.map(s => s.raw);
    const minR = Math.min(...raws), maxR = Math.max(...raws);
    const range = maxR - minR || 1;
    return rawScores.map(s => ({
        ...s,
        score: Math.round((60 + (s.raw - minR) / range * 39.9) * 10) / 10
    })).sort((a,b) => b.score - a.score);
}

function generateReason(shop, rank, now) {
    const reasons = [];
    const h = now.getHours();
    const rokuyo = getRokuyo(now);
    const moonPhase = getMoonPhase(now);
    
    // エレメント
    const elementMsg = {
        '火':'火のエレメント同士で運気が共鳴します',
        '土':'土のエレメントが安定感をもたらします',
        '風':'風のエレメントが軽やかな運気を運びます',
        '水':'水のエレメントが浄化と癒しをもたらします'
    };
    reasons.push(elementMsg[shop.element]);
    
    // 時間帯
    if (h >= 7 && h < 11) reasons.push('朝の運気が高まる時間帯です');
    else if (h >= 11 && h < 15) reasons.push('ランチタイムの黄金時間帯です');
    else if (h >= 15 && h < 18) reasons.push('午後のリフレッシュに最適です');
    else if (h >= 18 && h < 22) reasons.push('夕食の運気が絶頂です');
    
    // 六曜
    if (rokuyo === '大安') reasons.push('大安の吉日パワー');
    else if (rokuyo === '友引') reasons.push('友引で良縁を引き寄せます');
    
    // 月相
    const moonMsg = {
        '満月':'満月のエネルギーが最高潮',
        '新月':'新月の浄化と再生パワー',
        '更待月':'更待月の余韻が運気を持続',
        '三日月':'三日月の希望エネルギー',
        '上弦の月':'上弦月の行動力が高まる',
        '十三夜':'十三夜の期待感が高まる',
        '下弦の月':'下弦月の手放しと整理',
        '有明月':'有明月の内省と準備',
    };
    if (moonMsg[moonPhase.phase]) reasons.push(moonMsg[moonPhase.phase]);
    
    // ランク別
    if (rank === 1) reasons.push('今日のあなたに最も相性が良い店です');
    
    // 九星三層（本命星×年盤×月盤×日盤）
    const kds2 = getKyuseiDayScore(now);
    const relLabel = kds2.total >= 6 ? '大吉✨' : kds2.total >= 0 ? '吉' : kds2.total >= -3 ? '注意' : '凶⚠';
    const dRelLabel = (kds2.dScore || 0) >= 6 ? '大吉' : (kds2.dScore || 0) >= 0 ? '吉' : '注意';
    const fengDir2 = SHOP_DIRECTION[shop.name];
    const kyuseiMsg = '本命星(七赤金星)×月盤(' + (kds2.monthBoard||'').slice(0,2) + ')×日盤(' + (kds2.dayBoard||'').slice(0,2) + ')=' + relLabel;
    if (fengDir2 && fengDir2 !== '中央') {
        reasons.push('風水(' + fengDir2 + '方位)×' + kyuseiMsg);
    } else {
        reasons.push(kyuseiMsg);
    }
    return reasons.join('。') + '。';
}

}

function openMap(shopName) {
    const pos = SHOP_MAP_POS[shopName];
    const modal = document.getElementById('mapModal');
    document.getElementById('mapShopName').textContent = '\u{1F4CD} ' + shopName;
    document.getElementById('mapMarkerLabel').textContent = shopName;
    const floor = pos ? pos.floor : '1F';
    modal.classList.add('show');
    switchMapFloor(floor, pos);
    setTimeout(scrollToMarker, 400);
}
function switchMapFloor(floor, pos) {
    const img1F = document.getElementById('mapImg1F');
    const img2F = document.getElementById('mapImg2F');
    document.getElementById('tab1F').className = 'map-floor-tab' + (floor==='1F'?' active':'');
    document.getElementById('tab2F').className = 'map-floor-tab' + (floor==='2F'?' active':'');
    img1F.style.display = floor==='1F'?'block':'none';
    img2F.style.display = floor==='2F'?'block':'none';
    if(!pos){ const name = document.getElementById('mapShopName').textContent.replace('\u{1F4CD} ',''); pos = SHOP_MAP_POS[name]; }
    placeMarker(pos, floor);
}
function placeMarker(pos, floor) {
    const marker = document.getElementById('mapMarker');
    const wrap   = document.getElementById('mapWrap');
    if(!pos || pos.floor !== floor){ marker.style.display='none'; return; }
    const imgEl = floor==='1F' ? document.getElementById('mapImg1F') : document.getElementById('mapImg2F');
    const iw = imgEl.clientWidth  || 400;
    const ih = imgEl.clientHeight || (iw*848/1200);
    marker.style.left    = (iw * pos.x / 100) + 'px';
    marker.style.top     = (ih * pos.y / 100) + 'px';
    marker.style.display = 'block';
}
function scrollToMarker() {
    const wrap   = document.getElementById('mapWrap');
    const marker = document.getElementById('mapMarker');
    if(marker.style.display==='none') return;
    const mx = parseFloat(marker.style.left)||0;
    const my = parseFloat(marker.style.top)||0;
    wrap.scrollTo({ left: Math.max(0,mx-wrap.clientWidth/2), top: Math.max(0,my-wrap.clientHeight/2), behavior:'smooth' });
}
function closeMap(){ document.getElementById('mapModal').classList.remove('show'); }
['mapImg1F','mapImg2F'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.addEventListener('load', function(){
        var name = document.getElementById('mapShopName').textContent.replace('\u{1F4CD} ','');
        var pos2 = SHOP_MAP_POS[name];
        var fl = id==='mapImg1F' ? '1F' : '2F';
        if(pos2 && pos2.floor===fl && this.style.display!=='none') placeMarker(pos2,fl);
    });
});
